
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    border: 1px solid #dbdbdb;
    padding: 40px;
    width: 300px;
    text-align: center;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #dbdbdb;
    border-radius: 4px;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 10px;
    background: #0095f6;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #007cd1;
}

.divider {
    margin: 15px 0;
    color: #8e8e8e;
    font-size: 14px;
}

.forgot {
    font-size: 12px;
    color: #00376b;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">InstaClone</div>

    <input type="text" placeholder="Telefon, kullanıcı adı veya e-posta">
    <input type="password" placeholder="Şifre">

    <button>Giriş Yap</button>

    <div class="divider">veya</div>

    <div class="forgot">Şifreni mi unuttun?</div>
</div>

</body>
</html>
